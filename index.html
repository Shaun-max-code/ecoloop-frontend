<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EcoLoop</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
}

.logo {
    font-size: 22px;
    font-weight: 700;
    color: #22c55e;
}

.nav-links a {
    margin-left: 20px;
    color: #94a3b8;
    text-decoration: none;
    transition: 0.3s;
}

.nav-links a:hover {
    color: white;
}

/* HERO */
.hero {
    text-align: center;
    padding: 80px 20px;
}

.hero h1 {
    font-size: 48px;
    margin-bottom: 20px;
}

.hero span {
    color: #22c55e;
}

.hero p {
    color: #94a3b8;
    margin-bottom: 30px;
}

.btn {
    padding: 14px 26px;
    background: linear-gradient(135deg, #22c55e, #4ade80);
    border-radius: 12px;
    text-decoration: none;
    color: white;
    font-weight: 600;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

/* DASHBOARD */
.container {
    max-width: 1100px;
    margin: auto;
    padding: 40px 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(14px);
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
}

.card h3 {
    color: #94a3b8;
    font-size: 14px;
}

.card p {
    font-size: 28px;
    font-weight: 700;
    margin-top: 10px;
}

/* UPLOAD BOX */
.upload-box {
    margin-top: 40px;
    padding: 30px;
    border: 2px dashed #334155;
    border-radius: 20px;
    text-align: center;
}

.upload-box input {
    margin-top: 10px;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 30px;
    color: #64748b;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">EcoLoop 🌱</div>
    <div class="nav-links">
        <a href="#">Dashboard</a>
        <a href="#">Leaderboard</a>
        <a href="#">Profile</a>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <h1>Turn Waste Into <span>Impact</span></h1>
    <p>Track recycling. Earn points. Save the planet.</p>
    <a href="#" class="btn">Get Started</a>
</div>

<!-- DASHBOARD -->
<div class="container">
    <div class="grid">

        <div class="card">
            <h3>Total Points</h3>
            <p>120</p>
        </div>

        <div class="card">
            <h3>Waste Entries</h3>
            <p>15</p>
        </div>

        <div class="card">
            <h3>CO₂ Saved</h3>
            <p>32 kg</p>
        </div>

    </div>

    <!-- Upload Section -->
    <div class="upload-box">
        <h3>Upload Waste</h3>
        <input type="file">
        <br><br>
        <button class="btn">Submit</button>
    </div>
</div>

<!-- FOOTER -->
<div class="footer">
    Built for Hackathons 🚀
</div>

</body>
</html>
